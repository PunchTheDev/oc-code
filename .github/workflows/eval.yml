name: Evaluate Agent Submission

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# One active eval per submitter — prevents queue flooding at scale.
# If a new push arrives while eval is running, the old run is cancelled.
concurrency:
  group: eval-${{ github.actor }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect:
    name: Detect agent submission
    runs-on: ubuntu-latest
    outputs:
      agent_path: ${{ steps.find.outputs.agent_path }}
      handle: ${{ steps.find.outputs.handle }}
      is_agent_pr: ${{ steps.find.outputs.is_agent_pr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed agent file
        id: find
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'agent/submissions/*/agent.py')
          if [ -z "$CHANGED" ]; then
            echo "is_agent_pr=false" >> "$GITHUB_OUTPUT"
            echo "No agent/submissions/*/agent.py changes found — skipping eval."
            exit 0
          fi
          # Take the first changed agent (one submission per PR)
          AGENT_PATH=$(echo "$CHANGED" | head -1)
          HANDLE=$(echo "$AGENT_PATH" | cut -d/ -f3)
          echo "is_agent_pr=true" >> "$GITHUB_OUTPUT"
          echo "agent_path=$AGENT_PATH" >> "$GITHUB_OUTPUT"
          echo "handle=$HANDLE" >> "$GITHUB_OUTPUT"
          echo "Found agent: $AGENT_PATH (handle: $HANDLE)"

  evaluate:
    name: Score ${{ needs.detect.outputs.handle }}
    needs: detect
    if: needs.detect.outputs.is_agent_pr == 'true'
    runs-on: ubuntu-latest
    environment: "Github Actions Environment"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate submission metadata
        run: |
          python3 - <<'PYEOF'
          import json, sys, hashlib
          from pathlib import Path

          handle = "${{ needs.detect.outputs.handle }}"
          agent_path = Path("${{ needs.detect.outputs.agent_path }}")
          meta_path = agent_path.parent / "meta.json"
          allowed_path = Path("benchmark/harness/allowed_models.txt")

          errors = []

          # meta.json must exist
          if not meta_path.exists():
              errors.append(f"meta.json not found at {meta_path}. Required fields: handle, model, sha256")
          else:
              try:
                  meta = json.loads(meta_path.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f"meta.json is not valid JSON: {e}")
                  meta = {}

              # Model must be declared
              declared_model = meta.get("model", "")
              if not declared_model:
                  errors.append("meta.json missing 'model' field")
              elif allowed_path.exists():
                  allowed = {
                      ln.strip() for ln in allowed_path.read_text().splitlines()
                      if ln.strip() and not ln.startswith("#")
                  }
                  if declared_model not in allowed:
                      errors.append(
                          f"Declared model '{declared_model}' is not in the whitelist "
                          f"(benchmark/harness/allowed_models.txt). "
                          f"Allowed: {', '.join(sorted(allowed))}"
                      )

              # SHA-256 must match agent file (commit-reveal integrity)
              declared_sha = meta.get("sha256", "")
              if declared_sha and agent_path.exists():
                  actual_sha = hashlib.sha256(agent_path.read_bytes()).hexdigest()
                  if actual_sha != declared_sha:
                      errors.append(
                          f"meta.json sha256 mismatch — declared {declared_sha[:16]}… "
                          f"but agent.py hashes to {actual_sha[:16]}…. "
                          f"Run: python3 gitminer.py hash {agent_path}"
                      )

          if errors:
              print("Submission metadata validation FAILED:", file=sys.stderr)
              for e in errors:
                  print(f"  - {e}", file=sys.stderr)
              sys.exit(1)
          else:
              model = json.loads(meta_path.read_text()).get("model", "?")
              print(f"Metadata valid — handle={handle}, model={model}")
          PYEOF
        # Hard-blocking — invalid metadata means we can't record the result correctly

      - name: Rate limit check (anti-spam)
        run: |
          python scripts/check_rate_limit.py \
            --handle "${{ needs.detect.outputs.handle }}" \
            --max-per-week 5
        # Hard block — rate-limit exceeded fails the job, not just a warning

      - name: Similarity check (anti-copy)
        run: |
          python scripts/check_similarity.py \
            --agent "${{ needs.detect.outputs.agent_path }}"
        # No continue-on-error — exits 1 on copy detection, fails the job

      - name: Run evaluation (sandboxed)
        id: eval
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          SHARD_SECRET: ${{ secrets.SHARD_SECRET }}
        run: |
          python scripts/run_eval.py \
            --agent "${{ needs.detect.outputs.agent_path }}" \
            --output results.json \
            --save-behaviors "behaviors_new.json" \
            --workers 4
        timeout-minutes: 60
        continue-on-error: true  # allow posting results comment even if eval crashes

      - name: Reference copy check (anti-hardcoding)
        if: always()
        run: |
          if [ -f behaviors_new.json ]; then
            python scripts/check_reference_copy.py \
              --fingerprint behaviors_new.json
          else
            echo "No behavior fingerprint produced — skipping reference copy check."
          fi
        # No continue-on-error — exits 1 if agent is returning reference diffs verbatim

      - name: Output behavior similarity check (anti-copy)
        if: always()
        run: |
          if [ -f behaviors_new.json ]; then
            python scripts/check_output_similarity.py \
              --fingerprint behaviors_new.json
          else
            echo "No behavior fingerprint produced (eval may have failed) — skipping."
          fi
        # No continue-on-error — exits 1 if agent is behaviorally identical to existing submission

      - name: Parse results
        id: parse
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          results_path = Path("results.json")
          if not results_path.exists():
              summary = "Evaluation failed — results.json not produced."
              mean = "N/A"
              table = ""
          else:
              data = json.loads(results_path.read_text())
              mean = data.get("mean_score", 0)
              weighted_mean = data.get("weighted_mean_score", mean)
              weighted_benchmark = data.get("weighted_benchmark_score")
              problems = data.get("problems", [])

              rows = []
              for p in problems:
                  pid = p.get("problem_id", "?")
                  score = p.get("final_score", 0)
                  bench = p.get("benchmark_score")
                  tpr = p.get("test_pass_rate")
                  passed = "✓" if p.get("tests_passed") else "✗"
                  err = p.get("error", "")
                  bench_str = f"{bench:.3f}" if bench is not None else "—"
                  tpr_str = f"{tpr:.0%}" if tpr is not None else "—"
                  note = f"`{err[:60]}`" if err else ""
                  rows.append(f"| {pid} | {passed} | {tpr_str} | {score:.2f} | {bench_str} | {note} |")

              table = "\n".join(rows)
              if weighted_benchmark is not None:
                  summary = f"**Weighted benchmark: {weighted_benchmark:.4f}** (PRIMARY) | Weighted mean: {weighted_mean:.4f} / 30 across {len(problems)} problems"
              else:
                  summary = f"**Weighted mean: {weighted_mean:.4f} / 30** (arithmetic {mean:.4f}) across {len(problems)} problems"

          env_file = os.environ.get("GITHUB_ENV", "/dev/null")
          with open(env_file, "a") as f:
              f.write(f"EVAL_SUMMARY={summary}\n")
              f.write(f"EVAL_MEAN={mean}\n")

          output_file = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(output_file, "a") as f:
              # Write table as multiline
              f.write("table<<ENDTABLE\n")
              f.write(table + "\n")
              f.write("ENDTABLE\n")
              f.write(f"mean={mean}\n")
              f.write(f"summary={summary}\n")
          PYEOF

      - name: Post score comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const handle = '${{ needs.detect.outputs.handle }}';
            const agentPath = '${{ needs.detect.outputs.agent_path }}';

            let resultsJson = null;
            try {
              resultsJson = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            } catch (e) {}

            // Build baseline lookup: problem_id → {base_score, difficulty}
            const baselineMap = {};
            const difficultyMap = {};
            try {
              const bl = JSON.parse(fs.readFileSync('results/baselines.json', 'utf8'));
              for (const p of (bl.problems ?? [])) {
                baselineMap[p.id] = p.base_score ?? null;
                difficultyMap[p.id] = p.difficulty ?? null;
              }
            } catch (e) {}

            // Get oracle benchmark score from leaderboard (primary ranking metric = 1.0)
            let oracleBenchmark = 1.0;
            try {
              const lb = JSON.parse(fs.readFileSync('results/leaderboard.json', 'utf8'));
              const oracle = lb.find(e => e.agent === 'Oracle (accepted solution)');
              if (oracle) oracleBenchmark = oracle.weighted_benchmark_score ?? oracle.benchmark_score ?? 1.0;
            } catch (e) {}

            function difficulty(pid) {
              return difficultyMap[pid] ?? '';
            }

            let body;
            if (!resultsJson) {
              body = `## Benchmark Evaluation — ${handle}\n\n` +
                `**Status:** Evaluation failed to produce results.\n\n` +
                `Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
            } else {
              const mean = resultsJson.mean_score ?? 0;
              const weightedMean = resultsJson.weighted_mean_score ?? mean;
              const weightedBenchmark = resultsJson.weighted_benchmark_score ?? null;
              const meanBenchmark = resultsJson.mean_benchmark_score ?? null;
              const problems = resultsJson.problems ?? [];
              const passed = problems.filter(p => p.tests_passed).length;
              let beatBaseline = 0;

              const rows = problems.map(p => {
                const pid = p.problem_id ?? '?';
                const score = p.final_score ?? 0;
                const baseline = baselineMap[pid] ?? null;
                const ok = p.tests_passed ? '✓' : '✗';
                const cat = p.category ?? '—';
                const tpr = p.test_pass_rate != null ? `${(p.test_pass_rate * 100).toFixed(0)}%` : '—';
                const bench = p.benchmark_score != null ? p.benchmark_score.toFixed(3) : '—';
                const warn = p.test_deletion_warning ? ' ⚠️' : '';
                const diff = baseline !== null
                  ? (score >= baseline ? `+${(score - baseline).toFixed(1)}` : (score - baseline).toFixed(1))
                  : '';
                if (baseline !== null && score >= baseline) beatBaseline++;
                const baselineCell = baseline !== null ? baseline.toFixed(1) : '—';
                const diffCell = diff ? diff : '—';
                return `| ${pid} | ${cat} | ${difficulty(pid)} | ${baselineCell} | ${ok}${warn} | ${tpr} | ${score.toFixed(2)} | ${bench} | ${diffCell} |`;
              }).join('\n');

              const oracleNote = ` &nbsp;|&nbsp; Oracle benchmark: **${oracleBenchmark.toFixed(4)}**`;
              const primaryLine = weightedBenchmark !== null
                ? `**Weighted benchmark: ${weightedBenchmark.toFixed(4)}** (PRIMARY — difficulty-weighted correctness × quality)`
                : `**Weighted mean: ${weightedMean.toFixed(4)} / 30** (arithmetic ${mean.toFixed(4)})`;

              body = `## Benchmark Evaluation — ${handle}\n\n` +
                primaryLine + ` &nbsp;|&nbsp; ` +
                `**${passed}/${problems.length} passed** &nbsp;|&nbsp; ` +
                `**${beatBaseline}/${problems.length} beat baseline**` +
                oracleNote + `\n\n` +
                `| Problem | Category | Difficulty | Baseline | Tests | Pass% | Score | Bench | vs Baseline |\n` +
                `|---------|----------|------------|----------|-------|-------|-------|-------|-------------|\n` +
                rows + '\n\n' +
                `> ⚠️ = test deletion warning (benchmark_score halved)\n\n` +
                `<details>\n<summary>Run details</summary>\n\n` +
                `- Agent: \`${agentPath}\`\n` +
                `- Workflow: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n` +
                `- Commit: \`${{ github.event.pull_request.head.sha }}\`\n` +
                `</details>`;
            }

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## Benchmark Evaluation';
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Apply Gittensor labels and champion badge
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const handle = '${{ needs.detect.outputs.handle }}';

            // Parse eval results
            let mean = null;
            let weightedBenchmark = null;
            let oracleBenchmark = 1.0;
            try {
              const data = JSON.parse(fs.readFileSync('results.json', 'utf8'));
              mean = data.mean_score ?? null;
              weightedBenchmark = data.weighted_benchmark_score ?? data.mean_benchmark_score ?? null;
            } catch (e) {}
            try {
              const lb = JSON.parse(fs.readFileSync('results/leaderboard.json', 'utf8'));
              const real = lb.filter(r => r.rank !== null && r.weighted_benchmark_score != null);
              const oracleRow = lb.find(r => r.rank === null);
              oracleBenchmark = oracleRow?.weighted_benchmark_score ?? oracleRow?.benchmark_score ?? 1.0;
              // Current SOTA by weighted_benchmark_score (primary ranking metric)
              const sota = real.length > 0
                ? Math.max(...real.map(r => r.weighted_benchmark_score ?? r.benchmark_score ?? 0))
                : 0;
              context.sota = sota;
            } catch (e) { oracleBenchmark = 1.0; context.sota = 0; }

            if (mean === null) return; // eval failed, skip labeling

            // Ensure required labels exist in the repo
            const labelsToEnsure = [
              { name: 'agent-improvement', color: '2ea44f', description: 'Improves the base miner agent (2.0× emission multiplier)' },
              { name: 'new-champion', color: 'f9c513', description: 'Beats the current SOTA score — new leaderboard leader' },
            ];
            const { data: existingLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingNames = new Set(existingLabels.map(l => l.name));
            for (const label of labelsToEnsure) {
              if (!existingNames.has(label.name)) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } catch (e) { /* label may have been created concurrently */ }
              }
            }

            // Always apply agent-improvement label for any scored submission
            const labelsToAdd = ['agent-improvement'];

            // Apply new-champion if they beat current SOTA (compare weighted_benchmark_score)
            const sota = context.sota ?? 0;
            const effectiveScore = weightedBenchmark ?? 0;
            const isNewChampion = effectiveScore > sota && effectiveScore > 0;
            if (isNewChampion) {
              labelsToAdd.push('new-champion');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd,
            });

            // If new champion, post a celebration comment
            const scoreStr = effectiveScore > 0 ? effectiveScore.toFixed(4) : (mean ?? 0).toFixed(4);
            if (isNewChampion) {
              const oracleNote = ` (oracle benchmark: **${oracleBenchmark.toFixed(4)}**)`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### New SOTA: weighted_benchmark_score = ${scoreStr}\n\n` +
                  `**${handle}** is the new benchmark champion, beating the previous record of **${context.sota.toFixed(4)}**${oracleNote}.\n\n` +
                  `Merge this PR — CI will re-score, record the result, update the leaderboard, ` +
                  `save the behavior fingerprint, promote the champion agent, and refresh the dashboard automatically.`,
              });
            }

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.event.pull_request.number }}
          path: |
            results.json
            behaviors_new.json
          retention-days: 30
