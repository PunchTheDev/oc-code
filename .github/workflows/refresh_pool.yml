name: Refresh Problem Pool

on:
  schedule:
    # Every Sunday at 02:00 UTC — after the weekly shard rotation seed advances
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      repo:
        description: "Target a single repo (e.g. phase-rs/phase). Leave empty for all."
        required: false
        default: ""
      limit_per_repo:
        description: "Max new problems to add per repo (default: reads max_new_per_rotation from pool_config.json)"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    name: Pull new problems from DAS + external repos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.email "punch-ci@gittensor.io"
          git config user.name "Punch CI"

      - name: Run build_pool.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_ARG=""
          # Use input override, or fall back to max_new_per_rotation from pool_config.json
          INPUT_LIMIT="${{ github.event.inputs.limit_per_repo }}"
          if [[ -n "$INPUT_LIMIT" ]]; then
            LIMIT="$INPUT_LIMIT"
          else
            LIMIT=$(python3 -c "import json; cfg=json.load(open('benchmark/pool_config.json')); print(cfg.get('max_new_per_rotation', 50))")
          fi
          if [[ -n "${{ github.event.inputs.repo }}" ]]; then
            REPO_ARG="--repo ${{ github.event.inputs.repo }}"
          fi
          python scripts/build_pool.py $REPO_ARG --limit-per-repo "$LIMIT"

      - name: Refresh external repos
        # Only run on scheduled/full refreshes (no targeted repo override)
        if: github.event.inputs.repo == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_LIMIT="${{ github.event.inputs.limit_per_repo }}"
          if [[ -n "$INPUT_LIMIT" ]]; then
            LIMIT="$INPUT_LIMIT"
          else
            LIMIT=$(python3 -c "import json; cfg=json.load(open('benchmark/pool_config.json')); print(cfg.get('max_new_per_rotation', 50))")
          fi
          python scripts/expand_pool_external.py --limit-per-repo "$LIMIT"

      - name: Update pool_size in pool_config.json
        run: |
          POOL_SIZE=$(ls benchmark/problems/*/meta.json 2>/dev/null | wc -l | tr -d ' ')
          python3 - <<EOF
          import json
          from pathlib import Path
          cfg_path = Path("benchmark/pool_config.json")
          cfg = json.loads(cfg_path.read_text())
          cfg["pool_size"] = $POOL_SIZE
          cfg_path.write_text(json.dumps(cfg, indent=2) + "\n")
          EOF
          echo "Pool size: $POOL_SIZE"

      - name: Recalibrate oracle baselines
        run: |
          python scripts/baseline_scores.py --incremental --out results/baselines.json
          echo "Baselines recalibrated (incremental — only new problems scored)."

      - name: Sync oracle to pool_config.json
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          b = json.loads(Path("results/baselines.json").read_text())
          cfg_path = Path("benchmark/pool_config.json")
          cfg = json.loads(cfg_path.read_text())
          cfg["oracle_weighted"] = round(b.get("weighted_mean_score") or b["mean_score"], 2)
          cfg["oracle_arithmetic"] = round(b["mean_score"], 2)
          cfg_path.write_text(json.dumps(cfg, indent=2) + "\n")
          print(f"Oracle synced: weighted={cfg['oracle_weighted']}, arithmetic={cfg['oracle_arithmetic']}")
          EOF

      - name: Refresh oracle row in leaderboard.json
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          baseline_file = Path("results/baselines.json")
          lb_file = Path("results/leaderboard.json")
          if not baseline_file.exists() or not lb_file.exists():
              print("Skipping — missing baselines.json or leaderboard.json")
              exit(0)

          data = json.loads(baseline_file.read_text())
          mean_score = round(data["mean_score"], 2)
          weighted_score = round(data.get("weighted_mean_score") or mean_score, 2)
          count = data["count"]
          oracle_row = {
              "rank": None,
              "agent": "Oracle (accepted solution)",
              "score": mean_score,
              "weighted_score": weighted_score,
              "model": "\u2014",
              "date": "\u2014",
              "note": f"Weighted mean {weighted_score} (arithmetic {mean_score}) across {count} accepted solutions (DAS + external prestige repos)",
          }
          rows = json.loads(lb_file.read_text())
          rows = [oracle_row if r.get("agent") == "Oracle (accepted solution)" else r for r in rows]
          if not any(r.get("agent") == "Oracle (accepted solution)" for r in rows):
              rows.insert(0, oracle_row)
          lb_file.write_text(json.dumps(rows, indent=2) + "\n")
          print(f"Oracle row updated: weighted={weighted_score}, arithmetic={mean_score}, count={count}")
          EOF

      - name: Regenerate dashboard data
        run: |
          python scripts/generate_dashboard_data.py docs/dashboard_data.json
          echo "Dashboard data regenerated."

      - name: Commit and push new problems
        id: commit
        run: |
          git add benchmark/problems/ benchmark/pool_config.json results/baselines.json results/leaderboard.json docs/dashboard_data.json
          if git diff --cached --quiet; then
            echo "No new problems — pool is up to date."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEW=$(git diff --cached --name-only | grep 'benchmark/problems.*meta.json' | wc -l | tr -d ' ')
          TOTAL=$(ls benchmark/problems/*/meta.json 2>/dev/null | wc -l | tr -d ' ')
          ORACLE=$(python3 -c "import json; d=json.load(open('results/baselines.json')); print(round(d.get('weighted_mean_score') or d['mean_score'],2))")
          git commit -m "Add $NEW problems to pool (total: $TOTAL, oracle weighted: $ORACLE)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger dashboard refresh
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run refresh_dashboard.yml --repo ${{ github.repository }}
