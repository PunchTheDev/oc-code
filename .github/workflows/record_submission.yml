name: Record Merged Submission

# Fires when an agent PR is merged into main.
# Re-runs the eval, records the result, and triggers dashboard refresh.

on:
  push:
    branches: [main]
    paths:
      - "agent/submissions/*/agent.py"

permissions:
  contents: write

jobs:
  record:
    name: Score and record merged agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find changed agent
        id: find
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'agent/submissions/*/agent.py' 2>/dev/null || \
                    git show --name-only --format="" HEAD -- 'agent/submissions/*/agent.py')
          if [ -z "$CHANGED" ]; then
            echo "No agent changed — exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AGENT_PATH=$(echo "$CHANGED" | head -1)
          HANDLE=$(echo "$AGENT_PATH" | cut -d/ -f3)
          echo "agent_path=$AGENT_PATH" >> "$GITHUB_OUTPUT"
          echo "handle=$HANDLE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Scoring $AGENT_PATH (handle: $HANDLE)"

      - name: Run evaluation (no-sandbox, model whitelisted)
        if: steps.find.outputs.skip != 'true'
        id: eval
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          python scripts/run_eval.py \
            --agent "${{ steps.find.outputs.agent_path }}" \
            --no-sandbox \
            --output results_new.json
        timeout-minutes: 90
        continue-on-error: true

      - name: Record result
        if: steps.find.outputs.skip != 'true'
        run: |
          python scripts/record_result.py \
            --results results_new.json \
            --handle "${{ steps.find.outputs.handle }}" \
            --model "$(python3 -c "
          import json, pathlib
          meta = pathlib.Path('agent/submissions/${{ steps.find.outputs.handle }}/meta.json')
          if meta.exists():
              print(json.loads(meta.read_text()).get('model', '—'))
          else:
              print('—')
          ")"

      - name: Commit updated results
        if: steps.find.outputs.skip != 'true'
        run: |
          git config user.email "punch-ci@gittensor.io"
          git config user.name "Punch CI"
          git add results/leaderboard.json results/history.json
          if git diff --cached --quiet; then
            echo "Nothing changed."
          else
            git commit -m "Record ${{ steps.find.outputs.handle }} score"
            git push
          fi
