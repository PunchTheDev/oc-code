name: Record Merged Submission

# Fires when an agent PR is merged into main.
# Re-runs the eval, records the result, and triggers dashboard refresh.

on:
  push:
    branches: [main]
    paths:
      - "agent/submissions/*/agent.py"

permissions:
  contents: write
  actions: write

jobs:
  record:
    name: Score and record merged agent
    runs-on: ubuntu-latest
    environment: "Github Actions Environment"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore repo cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/gitminer/repos
          key: gitminer-repos-${{ hashFiles('benchmark/catalog.py') }}
          restore-keys: gitminer-repos-

      - name: Pre-warm repo cache
        run: python gitminer.py cache

      - name: Find changed agent
        id: find
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'agent/submissions/*/agent.py' 2>/dev/null || \
                    git show --name-only --format="" HEAD -- 'agent/submissions/*/agent.py')
          if [ -z "$CHANGED" ]; then
            echo "No agent changed — exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AGENT_PATH=$(echo "$CHANGED" | head -1)
          HANDLE=$(echo "$AGENT_PATH" | cut -d/ -f3)
          echo "agent_path=$AGENT_PATH" >> "$GITHUB_OUTPUT"
          echo "handle=$HANDLE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Scoring $AGENT_PATH (handle: $HANDLE)"

      - name: Run evaluation (sandboxed, authoritative score)
        if: steps.find.outputs.skip != 'true'
        id: eval
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          SHARD_SECRET: ${{ secrets.SHARD_SECRET }}
        run: |
          python scripts/run_eval.py \
            --agent "${{ steps.find.outputs.agent_path }}" \
            --output results_new.json \
            --save-behaviors behaviors_merged.json \
            --workers 4
        timeout-minutes: 90
        continue-on-error: true

      - name: Record result (+ persist behavior fingerprint)
        if: steps.find.outputs.skip != 'true'
        run: |
          if [ ! -f results_new.json ]; then
            echo "Evaluation did not produce results_new.json (eval may have failed or timed out)."
            echo "Skipping record step — leaderboard unchanged."
            exit 0
          fi
          python scripts/record_result.py \
            --results results_new.json \
            --handle "${{ steps.find.outputs.handle }}" \
            --behaviors behaviors_merged.json \
            --model "$(python3 -c "
          import json, pathlib
          meta = pathlib.Path('agent/submissions/${{ steps.find.outputs.handle }}/meta.json')
          if meta.exists():
              print(json.loads(meta.read_text()).get('model', '—'))
          else:
              print('—')
          ")"

      - name: Update champion if new SOTA
        if: steps.find.outputs.skip != 'true'
        id: champion
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, shutil, os

          lb = pathlib.Path("results/leaderboard.json")
          if not lb.exists():
              print("No leaderboard yet — skipping champion update.")
              exit(0)

          leaderboard = json.loads(lb.read_text())
          handle = os.environ["HANDLE"]

          # Find rank-1 real entry
          ranked = [r for r in leaderboard if r.get("rank") == 1]
          if not ranked or ranked[0].get("agent") != handle:
              print(f"{handle} is not rank 1 — skipping champion update.")
              exit(0)

          src = pathlib.Path(f"agent/submissions/{handle}/agent.py")
          dst_dir = pathlib.Path("agent/champion")
          dst_dir.mkdir(parents=True, exist_ok=True)

          shutil.copy(src, dst_dir / "agent.py")

          # Write champion metadata — weighted_benchmark_score is the primary metric.
          entry = ranked[0]
          wbs = entry.get("weighted_benchmark_score") or entry.get("benchmark_score")
          weighted = entry.get("weighted_score") or entry.get("score", 0)
          model = entry.get("model", "—")
          meta = {
              "handle": handle,
              "weighted_benchmark_score": wbs,
              "weighted_score": weighted,
              "score": entry.get("score", 0),
              "model": model,
          }
          (dst_dir / "meta.json").write_text(json.dumps(meta, indent=2))

          score_str = f"weighted_benchmark={wbs:.4f}" if wbs is not None else f"weighted={weighted:.4f}"
          print(f"Champion updated: {handle} ({score_str})")
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write("updated=true\n")
          PYEOF
        env:
          HANDLE: ${{ steps.find.outputs.handle }}

      - name: Commit updated results
        if: steps.find.outputs.skip != 'true'
        run: |
          git config user.email "punch-ci@gittensor.io"
          git config user.name "Punch CI"
          git add results/leaderboard.json results/history.json results/behaviors/ agent/champion/
          if git diff --cached --quiet; then
            echo "Nothing changed."
          else
            git commit -m "Record ${{ steps.find.outputs.handle }} score"
            git push
          fi

      - name: Trigger dashboard refresh
        if: steps.find.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run refresh_dashboard.yml --repo ${{ github.repository }}
