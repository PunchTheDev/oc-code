name: Refresh Dashboard

on:
  push:
    branches: [main]
    paths:
      - "results/**"
      - "benchmark/problems/**"
      - "benchmark/catalog.py"
      - "benchmark/pool_config.json"
      - "scripts/generate_dashboard_data.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    name: Regenerate and push data.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate data.json
        run: python scripts/generate_dashboard_data.py /tmp/data.json

      - name: Push to dashboard repo
        env:
          DASHBOARD_DEPLOY_TOKEN: ${{ secrets.DASHBOARD_DEPLOY_TOKEN }}
        run: |
          git config --global user.email "punch-ci@gittensor.io"
          git config --global user.name "Punch CI"

          git clone \
            "https://x-access-token:${DASHBOARD_DEPLOY_TOKEN}@github.com/PunchTheDev/gittensor-miner-dashboard.git" \
            /tmp/dashboard-repo

          cp /tmp/data.json /tmp/dashboard-repo/data.json

          cd /tmp/dashboard-repo
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json — skipping push."
            exit 0
          fi

          POOL=$(python3 -c "import json; d=json.load(open('data.json')); print(d['pool_size'])")
          LB=$(python3 -c "import json; d=json.load(open('data.json')); real=[r for r in d['leaderboard'] if r.get('rank')]; print(len(real))")
          git commit -m "Refresh dashboard: ${POOL} problems, ${LB} leaderboard entries"
          git push
