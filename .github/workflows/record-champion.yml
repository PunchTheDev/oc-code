name: Record champion on merge (disabled — superseded by record_submission.yml)

# DISABLED: record_submission.yml handles all post-merge recording.
# It fires on push to main, does a fresh eval, records scores + behavior fingerprints,
# promotes the champion, and refreshes the dashboard. Having two workflows doing this
# caused push conflicts. Kept here as reference only.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual override reason"
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  record:
    name: Record leaderboard result
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'agent-improvement')
    runs-on: ubuntu-latest
    environment: "Github Actions Environment"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find merged agent file
        id: find
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'agent/submissions/*/agent.py' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "No agent file found in merge — skipping record."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AGENT_PATH=$(echo "$CHANGED" | head -1)
          HANDLE=$(echo "$AGENT_PATH" | cut -d/ -f3)
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "agent_path=$AGENT_PATH" >> "$GITHUB_OUTPUT"
          echo "handle=$HANDLE" >> "$GITHUB_OUTPUT"

      - name: Download eval artifact from PR
        if: steps.find.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: eval-results-${{ github.event.pull_request.number }}
          path: .
        continue-on-error: true

      - name: Re-evaluate if artifact missing
        if: steps.find.outputs.skip != 'true'
        id: reeval
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          if [ -f results.json ]; then
            echo "Using existing artifact."
          else
            echo "Artifact not found — running fresh eval."
            python scripts/run_eval.py \
              --agent "${{ steps.find.outputs.agent_path }}" \
              --output results.json
          fi
        timeout-minutes: 60
        continue-on-error: true

      - name: Detect model used
        if: steps.find.outputs.skip != 'true'
        id: model
        run: |
          python - <<'PYEOF'
          import re, os
          from pathlib import Path
          agent_path = "${{ steps.find.outputs.agent_path }}"
          src = Path(agent_path).read_text(errors='ignore')
          # Look for OpenRouter model string
          m = re.search(r'model\s*=\s*["\']([^"\']+)["\']', src)
          model = m.group(1) if m else 'unknown'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"model={model}\n")
          PYEOF

      - name: Record result to leaderboard
        if: steps.find.outputs.skip != 'true'
        run: |
          if [ ! -f results.json ]; then
            echo "No results.json — cannot record."
            exit 0
          fi
          python scripts/record_result.py \
            --results results.json \
            --handle "${{ steps.find.outputs.handle }}" \
            --model "${{ steps.model.outputs.model }}"

      - name: Regenerate dashboard data
        if: steps.find.outputs.skip != 'true'
        run: |
          DASHBOARD_DIR="../gittensor-miner-dashboard"
          if [ -d "$DASHBOARD_DIR" ]; then
            python scripts/generate_dashboard_data.py --output "$DASHBOARD_DIR/data.json"
            echo "Dashboard data regenerated."
          else
            echo "Dashboard repo not co-located — skipping data.json regeneration."
          fi
        continue-on-error: true

      - name: Save behavior fingerprint
        if: steps.find.outputs.skip != 'true'
        run: |
          if [ -f behaviors_new.json ]; then
            HANDLE="${{ steps.find.outputs.handle }}"
            mkdir -p results/behaviors
            cp behaviors_new.json "results/behaviors/${HANDLE}.json"
            echo "Behavior fingerprint saved for ${HANDLE}."
          else
            echo "No behavior fingerprint found — skipping."
          fi

      - name: Commit leaderboard update
        if: steps.find.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/leaderboard.json results/history.json 2>/dev/null || true
          git add "results/behaviors/${{ steps.find.outputs.handle }}.json" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Record leaderboard result for ${{ steps.find.outputs.handle }}"
            git push origin main
          fi
