# Nginx location block — proxy /gitminer/ to the gitminer-api process (port 8083).
#
# Add this inside an existing `server {}` block:
#
#   server {
#       listen 443 ssl;
#       server_name your-host.example.com;
#       ...
#       include /path/to/this/nginx-location.conf;
#   }
#
# The API binds 0.0.0.0:8083 by default. Adjust the upstream port below if
# you started the server with a different --port.

location /gitminer/ {
    proxy_pass         http://127.0.0.1:8083/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # CORS — the API already sets these; let nginx pass them through.
    proxy_pass_header  Access-Control-Allow-Origin;
    proxy_pass_header  Access-Control-Allow-Methods;
    proxy_pass_header  Access-Control-Allow-Headers;

    # Timeouts — problem list with 1123 entries can take a moment.
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # Disable buffering so streaming responses aren't held.
    proxy_buffering    off;
}
