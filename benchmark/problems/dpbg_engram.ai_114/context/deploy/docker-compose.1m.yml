# Production override for the ~1M-neuron Hetzner deployment.
#
#   docker compose -f docker-compose.yml -f deploy/docker-compose.1m.yml up -d
#
# Per-service NATS credentials must be generated first:
#   bash deploy/scripts/gen-creds.sh
#
# This overlay switches the broker from the shared-token model to the per-service
# NKEY/JWT account model (ADR 0001-nats-authz.md). Each service authenticates
# with its own identity and is subject to an explicit publish/subscribe allowlist.

services:
  nats:
    # Use the account-resolver config (generated by gen-creds.sh) instead of
    # the shared-token config. gen-creds.sh writes .localrun/nats/resolver.conf
    # on the developer machine; on the server, copy it to deploy/nats-1m.conf
    # before deploying (or bind-mount the generated file directly).
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./deploy/nats-1m.conf:/etc/nats/nats.conf:ro
      - nats-data:/data

  neuromorphic:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/neuromorphic.creds
      SQLITE_PATH: /data/sqlite/neuromorphic.db
      # Full PoC scale (~1M neurons). Needs a large-RAM host.
      NEURO_BRAINSTEM_N: "15000"
      NEURO_REFLEX_N: "10000"
      NEURO_SENSORY_N: "200000"
      NEURO_MOTOR_N: "100000"
      NEURO_CEREBELLUM_N: "100000"
      NEURO_ASSOCIATION_N: "200000"
      NEURO_PREDICTIVE_N: "100000"
      NEURO_WORKING_MEM_N: "25000"
      NEURO_FEATURE_N: "20000"
      NEURO_CONCEPT_N: "5000"
      NEURO_META_N: "3000"
      NEURO_COGNITIVE_ENABLED: "1"
      # Turbo: compute-bound loop, larger drain batches.
      NEURO_QUEUE_SIZE: "50"
      NEURO_LOOP_YIELD: "0"
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          memory: 24g

  kernel:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/kernel.creds
  safety-supervisor:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/safety-supervisor.creds
  beliefs:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/beliefs.creds
  planner:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/planner.creds
  external-api:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/external-api.creds
  dashboard:
    environment:
      NATS_URL: nats://nats:4222
      NATS_CREDS: /run/secrets/dashboard.creds

  # Cloudflare Tunnel — exposes the dashboard without opening host ports.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: activelearning-cloudflared
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN}"]
    restart: unless-stopped
    depends_on:
      - dashboard
