# NATS server config for 1M neuron deployment
# The brain runs compute-bound loops (NEURO_LOOP_YIELD=0) and drains
# messages in batches between steps. Extend write_deadline to prevent
# slow consumer disconnects during long simulation steps.

listen: 0.0.0.0:4222
http: 0.0.0.0:8222

write_deadline: "60s"

# Client token authentication
authorization {
  token: $NATS_TOKEN
}

jetstream {
  store_dir: "/data"
}
