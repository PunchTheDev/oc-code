name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    # dev is the integration branch — feature PRs target dev; dev->main is the
    # release PR. Run CI for both targets.
    branches: [dev, main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  neuromorphic:
    name: Neuromorphic test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Run neuromorphic tests
        working-directory: neuromorphic
        # Skip the continuous MuJoCo physics-loop tests: their background
        # stepping aborts (SIGABRT) nondeterministically on headless runners.
        env:
          ENGRAM_SKIP_MUJOCO_LOOP: "1"
        run: uv run --extra dev python -m pytest tests/ -v -p no:anchorpy

  sdk:
    name: SDK test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Run SDK tests with coverage
        working-directory: sdk
        run: uv run --extra dev python -m pytest tests/ -v --cov=activelearning --cov-report=term-missing

  governance:
    name: Governance & safety tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Run Kernel + Meta-Programmer + Coordinator + Dashboard safety tests
        env:
          PYTHONPATH: kernel/src:meta-programmer/src:coordinator/src:dashboard/src
        # uv run builds an ephemeral env (avoids the runner's externally-managed
        # system Python); --with-editable ./sdk provides activelearning + its deps.
        # Coordinator gate + dashboard auth tests load their module under test
        # directly (pure stdlib), so they need no extra service deps.
        run: uv run --no-project --with-editable ./sdk --with pytest python -m pytest kernel/tests meta-programmer/tests coordinator/tests dashboard/tests -o addopts="" -v

  sandbox:
    name: Sandbox image build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds activelearning-sandbox:latest via the build-only compose profile,
      # then runs a passing + failing generated test set inside the hardened
      # container and asserts network/read-only isolation. Mirrors the runtime
      # flags in meta-programmer/.../sandbox_manager.py.
      - name: Build sandbox image + run smoke tests
        run: bash sandbox/smoke/run_smoke.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # BLOCKING: the "real bug" subset (syntax errors, undefined names, broken
      # comparisons/f-strings). A clean codebase always passes this; it would
      # have caught the memory-service NameError fixed in P0.3.
      - name: Ruff (blocking bug gate)
        run: uvx ruff check --select E9,F63,F7,F82 .

      # ADVISORY: full style rule set. Flip to blocking once the backlog is
      # cleared (ROADMAP.md P5).
      - name: Ruff (full, advisory)
        continue-on-error: true
        run: uvx ruff check .

      # ADVISORY: formatting. Flip to blocking after a one-time `black .` pass.
      - name: Black (advisory)
        continue-on-error: true
        run: uvx black --check --line-length 100 .

  typecheck:
    name: Type check (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # ADVISORY for now: strict mypy has a backlog. Step-level continue-on-error
      # keeps the job (and its check) green while still surfacing type errors in
      # the log. Flip to blocking once the backlog is cleared (ROADMAP.md P5).
      - name: Mypy (sdk)
        continue-on-error: true
        run: uvx mypy --python-version 3.11 --ignore-missing-imports sdk/src/activelearning
